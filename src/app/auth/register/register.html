<div style="min-height:100vh; display:flex; justify-content:center; align-items:center;">
  <div style="width:340px; border:1px solid #ddd; padding:20px; border-radius:8px;">
    
    <h2 style="text-align:center;">Registro</h2>

    <label>
      Nombre
      <input
        type="text"
        placeholder="Tu nombre"
        style="width:100%; padding:8px; margin-top:5px; margin-bottom:15px;"
      />
    </label>

    <label>
      Correo
      <input
        type="email"
        placeholder="correo@ejemplo.com"
        style="width:100%; padding:8px; margin-top:5px; margin-bottom:15px;"
      />
    </label>

    <label>
      Contraseña
      <input
        type="password"
        placeholder="********"
        style="width:100%; padding:8px; margin-top:5px; margin-bottom:15px;"
      />
    </label>

    <button
      style="width:100%; padding:10px; background:#388e3c; color:white; border:none; cursor:pointer;">
      Registrarse
    </button>

    <p style="text-align:center; margin-top:15px;">
      ¿Ya tienes cuenta?
      <a routerLink="/login">Inicia sesión</a>
    </p>

  </div>
</div>
