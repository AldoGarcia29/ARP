
<div style="min-height:100vh; display:flex; justify-content:center; align-items:center;">
  <div style="width:320px; border:1px solid #ddd; padding:20px; border-radius:8px;">
    
    <h2 style="text-align:center;">Iniciar sesión</h2>

    <label>
      Correo
      <input
        type="email"
        placeholder="correo@ejemplo.com"
        style="width:100%; padding:8px; margin-top:5px; margin-bottom:15px;"
      />
    </label>

    <label>
      Contraseña
      <input
        type="password"
        placeholder="********"
        style="width:100%; padding:8px; margin-top:5px; margin-bottom:15px;"
      />
    </label>

    <button
      style="width:100%; padding:10px; background:#1976d2; color:white; border:none; cursor:pointer;">
      Entrar
    </button>

    <p style="text-align:center; margin-top:15px;">
      ¿No tienes cuenta?
      <a routerLink="/register">Regístrate</a>
    </p>

  </div>
</div>
